<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Playground</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>JavaScript Playground</h1>
        <p>Level 1 - Task 2 | Cognifyz Internship</p>
    </header>

    <div class="container">

        <!-- Color Changer -->

        <div class="card">

            <h2>🎨 Color Changer</h2>

            <div id="colorBox"></div>

            <button onclick="changeColor()">
                Change Color
            </button>

            <p id="colorCode">
                Current Color :
                #3498db
            </p>

        </div>

        <!-- Greeting -->

        <div class="card">

            <h2>🌞 Greeting Generator</h2>

            <button onclick="showGreeting()">

                Show Greeting

            </button>

            <h3 id="greeting">

            </h3>

        </div>

        <!-- Calculator -->

        <div class="card">

            <h2>🧮 Smart Calculator</h2>

            <input
                type="number"
                id="num1"
                placeholder="Enter First Number">

            <input
                type="number"
                id="num2"
                placeholder="Enter Second Number">

            <div class="buttons">

                <button onclick="calculate('+')">+</button>

                <button onclick="calculate('-')">−</button>

                <button onclick="calculate('*')">×</button>

                <button onclick="calculate('/')">÷</button>

            </div>

            <h3 id="result">
                Result :
            </h3>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
